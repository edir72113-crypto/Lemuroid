name: Build Lemuroid APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: # Permite rodar manualmente pelo botão azul

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Forçar download dos emuladores atualizados
      run: |
        git submodule init
        git submodule update --remote --recursive

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Dar permissão ao Gradle
      run: chmod +x gradlew

    - name: Buildar o APK (Assemble Debug)
      # Adicionamos --no-daemon para economizar RAM e --stacktrace para ver erros detalhados
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload do APK Gerado
      uses: actions/upload-artifact@v4
      with:
        name: Lemuroid-Mod-APK
        # Ajustado para o caminho correto do módulo 'lemuroid-app'
        path: lemuroid-app/build/outputs/apk/**/*.apk
