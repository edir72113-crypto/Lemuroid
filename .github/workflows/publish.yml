name: Build Lemuroid APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: # <-- Isso cria o botão azul "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4
      # Tiramos o submodules: recursive daqui!

    - name: Forçar download dos emuladores atualizados
      run: |
        git submodule init
        git submodule update --remote --recursive

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Dar permissão ao Gradle
      run: chmod +x gradlew

    - name: Buildar o APK (Assemble Debug)
      run: ./gradlew assembleDebug

    - name: Upload do APK Gerado
      uses: actions/upload-artifact@v4
      with:
        name: Lemuroid-Mod-APK
        path: app/build/outputs/apk/debug/app-debug.apk
