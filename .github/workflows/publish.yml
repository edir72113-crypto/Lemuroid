name: Build Lemuroid APK

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4
      with:
        submodules: recursive # O Lemuroid precisa disso para baixar o C++

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Dar permissão ao Gradle
      run: chmod +x gradlew

    - name: Buildar o APK (Assemble Debug)
      run: ./gradlew assembleDebug

    - name: Upload do APK Gerado
      uses: actions/upload-artifact@v4
      with:
        name: Lemuroid-Mod-APK
        path: app/build/outputs/apk/debug/app-debug.apk
